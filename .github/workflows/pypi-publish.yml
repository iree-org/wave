name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
        build_run_id:
            description: Run ID to retrieve Python wheels from
            required: true

jobs:
  pypi-publish:
    name: Publish run ${{ github.event.inputs.build_run_id }}'s wheels to PyPI
    runs-on: ubuntu-24.04
    environment:
        name: pypi-publish
        url: https://pypi.org/project/wave-lang/
    permissions:
      id-token: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          run-id: ${{ github.event.inputs.build_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: snapshot-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v.1.14.0
